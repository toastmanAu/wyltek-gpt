ollama:
  url: http://localhost:11434
  # If Ollama lives on another machine in your LAN/tailnet, override here.
  # Example: http://192.168.1.100:11434

server:
  host: 127.0.0.1
  port: 8000

ui:
  # The theme that loads on first visit. Built-in options:
  #   catppuccin-mocha, tokyo-night, nord, classic-green, custom
  # Drop a new file in frontend/themes/ to add more — the dropdown
  # auto-discovers everything in that directory.
  default_theme: tokyo-night

assistant:
  system_prompt: |
    Always be truthful — if you don't know something, say so.
    Calm and collected is always the best feel.
    Nervos Network is the assumed blockchain base unless explicitly stated otherwise.
    Most Nervos scripts are Rust; C is a secondary option.

    Default to answering questions directly and conversationally in plain prose.
    Do NOT generate code, scripts, or commands unless the user explicitly asks for one.
    A question like "what OS are you on?" wants a short factual answer, not a script that detects the OS.

    When the user does ask for code, use fenced blocks with a language tag.
    When the user explicitly asks you to save something to a file, use this convention:

    ```file:path/to/output.ext
    <contents>
    ```

skills:
  enabled: []  # filled in once the skill registry lands in v2

# ──────────────────────────────────────────────────────────────────
# Storage — workspace is internal (chat-linked); output_dir is the
# host-visible mirror for model-produced files. Set output_dir to
# null/empty to disable the mirror.
# ──────────────────────────────────────────────────────────────────
storage:
  workspace: workspaces
  output_dir: ~/Downloads/wyltek-gpt-output
  dropbox: dropbox

# ──────────────────────────────────────────────────────────────────
# Auto-router — specialised request paths that bypass the selected
# chat model. Currently just captioning: when a user uploads an image
# and asks a describe-y question, the request gets routed to a
# dedicated captioner model regardless of which chat model is selected.
#
# captioner_model: name in `ollama list`. Empty disables auto-routing.
# ──────────────────────────────────────────────────────────────────
auto_router:
  captioner_model: qwen3-omni-captioner:30b-a3b-q4

# ──────────────────────────────────────────────────────────────────
# Bridges — external services the model can reach via fixed-shape
# bridge modules. Each bridge is health-probed at startup; operations
# that depend on an offline bridge are soft-disabled (same pattern as
# missing converter binaries). Never put model-supplied input into a
# bridge URL.
# ──────────────────────────────────────────────────────────────────
bridges:
  open_palette:
    url: http://localhost:7860
    probe: /api/backends
    timeout: 600

# ──────────────────────────────────────────────────────────────────
# Operations — model-invoked file editing + generation.
#
# Two kinds:
#   - kind: local   — runs a host binary via fixed argv template.
#                     {source}, {output}, {out_dir}, {stem}, plus any
#                     declared param name are slot-substituted with
#                     validated values.
#   - kind: bridge  — proxied to a configured bridge. The bridge
#                     module owns the wire protocol; this entry only
#                     declares param schema + which bridge to use.
#
# Param types: enum, int_range, float_range, timestamp, text, dimension.
# Every param value the model supplies is validated before subprocess
# or HTTP call. Validation failures bubble back to the model so it can
# self-correct on retry.
#
# Phase 1 ships two operations as proof-of-architecture: trim_video
# (local ffmpeg) and generate_image (open-palette bridge with prompt
# enhancement). Add more operations by appending entries.
# ──────────────────────────────────────────────────────────────────
operations:
  - id: trim_video
    kind: local
    requires: ffmpeg
    description: >
      Trim a video to a time range. Lossless — stream-copies codec, no
      re-encode. Pass start and end as HH:MM:SS, MM:SS, or seconds.
    source_param: source
    accepts: [mp4, mkv, mov, webm, avi, m4v, flv]
    output_ext_from_source: true
    timeout: 300
    params:
      start:
        type: timestamp
        required: true
        description: Start of the kept range (HH:MM:SS, MM:SS, or seconds).
      end:
        type: timestamp
        required: true
        description: End of the kept range (HH:MM:SS, MM:SS, or seconds).
    argv:
      [ffmpeg, -y, -ss, "{start}", -to, "{end}", -i, "{source}",
       -c, copy, -avoid_negative_ts, make_zero, "{output}"]

  - id: scale_image
    kind: local
    requires: vipsthumbnail
    description: >
      Scale an image to a target maximum dimension (preserves aspect ratio).
      Output extension matches the input. Pass max_size in pixels (longest side).
    source_param: source
    accepts: [jpg, jpeg, png, webp, tiff, tif, gif, bmp]
    output_ext_from_source: true
    timeout: 60
    params:
      max_size:
        type: int_range
        min: 16
        max: 8192
        required: true
        description: Longest side in pixels. Smaller side scales to preserve aspect ratio.
    argv: [vipsthumbnail, "{source}", --size, "{max_size}", -o, "{output}"]

  - id: requantize_image
    kind: local
    requires: ffmpeg
    description: >
      Re-encode an image to JPEG at a chosen quality level (1-100).
      Output is always .jpg. Use to shrink file size or convert to JPEG.
    source_param: source
    accepts: [jpg, jpeg, png, webp, tiff, tif, bmp]
    output_ext: jpg
    timeout: 60
    params:
      quality:
        type: int_range
        min: 1
        max: 100
        required: true
        description: JPEG quality. 50-75 is small, 85-95 is high.
    argv: [ffmpeg, -y, -i, "{source}", -q:v, "{quality}", "{output}"]

  - id: extract_audio
    kind: local
    requires: ffmpeg
    description: >
      Extract the audio track from a video as MP3 at a chosen bitrate.
    source_param: source
    accepts: [mp4, mkv, mov, webm, avi, m4v, flv]
    output_ext: mp3
    timeout: 600
    params:
      bitrate:
        type: enum
        choices: ["64k", "96k", "128k", "192k", "256k", "320k"]
        default: "128k"
        description: MP3 bitrate. 128k is balanced.
    argv: [ffmpeg, -y, -i, "{source}", -vn, -b:a, "{bitrate}", "{output}"]

  - id: trim_audio
    kind: local
    requires: ffmpeg
    description: >
      Trim an audio file to a time range. Lossless — stream-copies codec.
    source_param: source
    accepts: [mp3, m4a, ogg, opus, wav, flac, aac]
    output_ext_from_source: true
    timeout: 300
    params:
      start:
        type: timestamp
        required: true
        description: Start of the kept range (HH:MM:SS, MM:SS, or seconds).
      end:
        type: timestamp
        required: true
        description: End of the kept range (HH:MM:SS, MM:SS, or seconds).
    argv:
      [ffmpeg, -y, -ss, "{start}", -to, "{end}", -i, "{source}",
       -c, copy, "{output}"]

  - id: generate_image
    kind: bridge
    bridge: open_palette
    enhance: true
    description: >
      Generate an image from a text prompt using the local image-gen
      backend (open-palette / ComfyUI). The prompt is strengthened by
      the active chat model first, with a Y/N/E confirm card before
      the GPU job runs.
    params:
      prompt:
        type: text
        required: true
        max_len: 2000
        description: What to generate. Plain English — the system enhances it.
      negative_prompt:
        type: text
        max_len: 1000
        default: ""
        description: Things to avoid. Usually filled by the enhancer.
      width:
        type: dimension
        choices: [512, 768, 1024, 1536]
        default: 1024
      height:
        type: dimension
        choices: [512, 768, 1024, 1536]
        default: 1024
      steps:
        type: int_range
        min: 10
        max: 60
        default: 30
        description: Diffusion steps. 30 is the sweet spot.
      cfg_scale:
        type: float_range
        min: 1.0
        max: 15.0
        default: 7.0
        description: Prompt adherence. 7 is default; lower = freer, higher = stricter.
      backend:
        type: enum
        choices: [comfyui]
        default: comfyui
      model:
        type: text
        max_len: 200
        default: ""
        description: Open-palette model name. Empty = use bridge default.
      mode:
        type: enum
        choices: [auto, sdxl, flux, pixel, anime]
        default: auto
        description: >
          Override the enhance branch. 'auto' detects from the model
          name (flux/pixel/anime substrings); falls back to sdxl.
    bridge_call:
      endpoint: /api/generate
      poll: /api/job/{job_id}

# ──────────────────────────────────────────────────────────────────
# Converter registry
# ──────────────────────────────────────────────────────────────────
# Each entry is a deterministic file conversion: source extension(s)
# → target extension(s) via a specific binary on PATH.
#
# - The model never assembles commands. argv is fixed; runtime fills
#   {input}, {output}, {out_dir}, {stem} from validated workspace paths.
# - On startup, any entry whose `requires` binary is missing is
#   soft-skipped with a one-line warning. The enabled list the UI/model
#   sees is always the truth.
# - Same-format conversions (e.g. png→png) are silently rejected —
#   they'd overwrite the input. Use a "preset" id and a different
#   target extension if you need same-format compression/optim later.
# - Add new entries by appending to this list and reloading the server.
#   Think of these as workflows, not raw tools — a preset that pins
#   useful flags (e.g. ffmpeg with -crf 23 -preset fast) earns its
#   place more than a generic catch-all.
# ──────────────────────────────────────────────────────────────────
converters:
  # === Documents ===
  - id: markitdown_to_md
    from: [pdf, docx, xlsx, pptx, html, htm, csv, json, xml, zip, jpg, jpeg, png]
    to: md
    requires: markitdown
    argv: [markitdown, "{input}", -o, "{output}"]

  - id: libreoffice_to_pdf
    from: [docx, doc, odt, rtf, xlsx, xls, ods, pptx, ppt, odp]
    to: pdf
    requires: libreoffice
    argv: [libreoffice, --headless, --convert-to, pdf, --outdir, "{out_dir}", "{input}"]
    timeout: 240

  - id: pandoc_md_to_html
    from: [md, markdown]
    to: html
    requires: pandoc
    argv: [pandoc, "{input}", -o, "{output}"]

  - id: pandoc_md_to_docx
    from: [md, markdown]
    to: docx
    requires: pandoc
    argv: [pandoc, "{input}", -o, "{output}"]

  - id: pandoc_md_to_epub
    from: [md, markdown]
    to: epub
    requires: pandoc
    argv: [pandoc, "{input}", -o, "{output}"]

  - id: pandoc_html_to_md
    from: [html, htm]
    to: md
    requires: pandoc
    argv: [pandoc, -f, html, -t, gfm, "{input}", -o, "{output}"]

  - id: pandoc_docx_to_md
    from: docx
    to: md
    requires: pandoc
    argv: [pandoc, -f, docx, -t, gfm, "{input}", -o, "{output}"]

  - id: weasyprint_html_to_pdf
    from: [html, htm]
    to: pdf
    requires: weasyprint
    argv: [weasyprint, "{input}", "{output}"]

  - id: pdftotext
    from: pdf
    to: txt
    requires: pdftotext
    argv: [pdftotext, "{input}", "{output}"]

  # === Ebooks ===
  - id: calibre_ebook_convert
    from: [epub, mobi, azw3, azw, fb2, lit, lrf, pdb, prc, htmlz]
    to: [epub, mobi, azw3, pdf, txt, html, fb2]
    requires: ebook-convert
    argv: [ebook-convert, "{input}", "{output}"]
    timeout: 240

  # === Images ===
  - id: vips_image_convert
    from: [jpg, jpeg, png, webp, tiff, tif, gif, bmp, ppm]
    to: [jpg, jpeg, png, webp, tiff, tif]
    requires: vips
    argv: [vips, copy, "{input}", "{output}"]

  - id: cwebp_to_webp
    from: [png, jpg, jpeg, tiff, tif]
    to: webp
    requires: cwebp
    argv: [cwebp, -q, "{quality}", "{input}", -o, "{output}"]
    params:
      quality:
        label: Quality
        default: "80"
        choices:
          - {value: "95", label: "95 (high)"}
          - {value: "80", label: "80 (balanced)"}
          - {value: "60", label: "60 (small)"}

  - id: dwebp_from_webp
    from: webp
    to: [png, pam, ppm]
    requires: dwebp
    argv: [dwebp, "{input}", -o, "{output}"]

  - id: rsvg_svg_to_png
    from: svg
    to: png
    requires: rsvg-convert
    argv: [rsvg-convert, "{input}", -o, "{output}"]

  - id: rsvg_svg_to_pdf
    from: svg
    to: pdf
    requires: rsvg-convert
    argv: [rsvg-convert, -f, pdf, "{input}", -o, "{output}"]

  - id: gif_to_webp_animated
    from: gif
    to: webp
    requires: gif2webp
    argv: [gif2webp, "{input}", -o, "{output}"]

  # === Video ===
  # Per-target converters: each container has its preferred codec strategy.
  # mp4 gets x264+aac with faststart (browser-streamable). webm gets vp9+opus
  # with VBR. mkv stream-copies (no re-encode, instant). gif gets sane defaults.

  - id: ffmpeg_to_mp4
    from: [mp4, mkv, mov, webm, avi, m4v, flv]
    to: mp4
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -vf, "scale=trunc(iw/2)*2:trunc(ih/2)*2",
           -c:v, libx264, -crf, "{quality}", -preset, fast,
           -c:a, aac, -b:a, 128k, -movflags, +faststart, "{output}"]
    timeout: 1800
    params:
      quality:
        label: Quality
        default: "23"
        choices:
          - {value: "18", label: "high (CRF 18)"}
          - {value: "23", label: "balanced (CRF 23)"}
          - {value: "28", label: "small (CRF 28)"}
          - {value: "33", label: "tiny (CRF 33)"}

  - id: ffmpeg_to_webm
    from: [mp4, mkv, mov, webm, avi, m4v, flv]
    to: webm
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -c:v, libvpx-vp9, -crf, "{quality}", -b:v, "0",
           -c:a, libopus, -b:a, 128k, "{output}"]
    timeout: 1800
    params:
      quality:
        label: Quality
        default: "32"
        choices:
          - {value: "24", label: "high (CRF 24)"}
          - {value: "32", label: "balanced (CRF 32)"}
          - {value: "38", label: "small (CRF 38)"}

  - id: ffmpeg_to_mkv
    from: [mp4, mkv, mov, webm, avi, m4v, flv]
    to: mkv
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -c, copy, "{output}"]
    timeout: 600

  - id: ffmpeg_to_gif
    from: [mp4, mkv, mov, webm, avi, m4v]
    to: gif
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -vf, "fps={fps},scale={width}:-1:flags=lanczos", "{output}"]
    timeout: 600
    params:
      fps:
        label: FPS
        default: "12"
        choices:
          - {value: "8", label: "8 fps (small)"}
          - {value: "12", label: "12 fps"}
          - {value: "15", label: "15 fps"}
          - {value: "24", label: "24 fps (smooth)"}
      width:
        label: Width
        default: "480"
        choices:
          - {value: "320", label: "320 px"}
          - {value: "480", label: "480 px"}
          - {value: "720", label: "720 px"}

  # === Audio (lossy + lossless split — bitrate only applies to lossy) ===
  - id: ffmpeg_video_to_audio
    from: [mp4, mkv, mov, webm, avi, m4v, flv]
    to: [mp3, m4a, ogg, opus]
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -vn, -b:a, "{bitrate}", "{output}"]
    timeout: 600
    params:
      bitrate:
        label: Bitrate
        default: "128k"
        choices:
          - {value: "192k", label: "192 kbps (high)"}
          - {value: "128k", label: "128 kbps"}
          - {value: "96k", label: "96 kbps"}
          - {value: "64k", label: "64 kbps (small)"}

  - id: ffmpeg_video_to_audio_lossless
    from: [mp4, mkv, mov, webm, avi, m4v, flv]
    to: [wav, flac]
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -vn, "{output}"]
    timeout: 600

  - id: ffmpeg_audio_transcode
    from: [mp3, wav, flac, m4a, ogg, opus, aac]
    to: [mp3, m4a, ogg, opus]
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", -b:a, "{bitrate}", "{output}"]
    timeout: 600
    params:
      bitrate:
        label: Bitrate
        default: "128k"
        choices:
          - {value: "192k", label: "192 kbps (high)"}
          - {value: "128k", label: "128 kbps"}
          - {value: "96k", label: "96 kbps"}
          - {value: "64k", label: "64 kbps (small)"}

  - id: ffmpeg_audio_to_lossless
    from: [mp3, wav, flac, m4a, ogg, opus, aac]
    to: [wav, flac]
    requires: ffmpeg
    argv: [ffmpeg, -y, -i, "{input}", "{output}"]
    timeout: 600

  - id: qwen3_asr_transcribe
    from: [mp3, wav, m4a, flac, ogg, mp4, mkv, webm]
    to: txt
    requires: qwen3-asr-transcribe
    argv: [qwen3-asr-transcribe, --input, "{input}", --output, "{output}", --model, "{model}"]
    timeout: 1800
    params:
      model:
        label: Model
        default: "1.7B"
        choices:
          # Model size is controlled by the worker's QWEN3_ASR_MODEL_SIZE env var.
          # To switch to 0.6B: systemctl --user edit qwen3-asr-worker.service
          - {value: "1.7B", label: "Qwen3-ASR 1.7B (accurate)"}
